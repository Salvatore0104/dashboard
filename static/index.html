<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claw 项目排期看板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container {
      background: white;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #333; margin-bottom: 16px; font-size: 28px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.6; }
    .status {
      background: #e6f4ff;
      border: 2px solid #1890ff;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .status.success { border-color: #52c41a; background: #f6ffed; }
    .status-icon { font-size: 48px; margin-bottom: 8px; }
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }
    .menu-item {
      padding: 16px;
      background: #f5f5f5;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: #333;
    }
    .menu-item:hover { background: #1890ff; color: white; transform: translateY(-2px); }
    .menu-icon { font-size: 32px; margin-bottom: 8px; }
    .menu-label { font-weight: bold; }
    .menu-desc { font-size: 12px; opacity: 0.7; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="status success">
      <div class="status-icon">✅</div>
      <h2>服务已启动</h2>
    </div>
    <h1>Claw 项目排期看板</h1>
    <p>Python 虚拟环境已配置完成<br>Flask 后端服务运行中</p>

    <div class="menu-grid">
      <a href="/dashboard.html" class="menu-item">
        <div class="menu-icon">📊</div>
        <div class="menu-label">前台看板</div>
        <div class="menu-desc">查看项目甘特图</div>
      </a>
      <a href="/admin.html" class="menu-item">
        <div class="menu-icon">⚙</div>
        <div class="menu-label">后台管理</div>
        <div class="menu-desc">管理项目和人员</div>
      </a>
      <a href="/tv.html" class="menu-item" style="grid-column: span 2;">
        <div class="menu-icon">📺</div>
        <div class="menu-label">电视看板</div>
        <div class="menu-desc">大屏幕展示模式</div>
      </a>
    </div>
  </div>
</body>
</html>
